<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="{{ page.description | default: site.description | escape }}">
    <meta name="author" content="Joshua Salako">
    <meta property="og:title" content="{% if page.title %}{{ page.title | escape }} · {% endif %}Joshua Salako">
    <meta property="og:description" content="{{ page.description | default: site.description | escape }}">
    <meta property="og:type" content="website">
    <meta property="og:url" content="{{ site.canonical_url }}{{ page.url | relative_url }}">
    <meta property="og:image" content="{{ site.canonical_url }}{{ '/images/joshua.jpg' | relative_url }}">
    <title>{% if page.title %}{{ page.title | escape }} · {% endif %}Joshua Salako</title>
    <link rel="icon" type="image/png" href="{{ '/images/avatar.png' | relative_url }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Source+Serif+4:ital,wght@0,400;0,600;0,700;1,400&amp;display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/jpswalsh/academicons@1/css/academicons.min.css">
{% capture asset_version %}{% if site.github.build_revision %}{{ site.github.build_revision }}{% else %}{{ site.time | date: '%s' }}{% endif %}{% endcapture %}
    <link rel="stylesheet" href="{{ '/styles.css' | relative_url }}?v={{ asset_version | strip | url_encode }}">
  </head>
  <body>
    {% include navigation.html %}
    {{ content }}
    {% include footer.html %}
  </body>
</html>
